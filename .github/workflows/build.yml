name: Build Matter LED firmware (ESP32-C6, Thread)

# Spustí se automaticky při každém pushnutí do repozitáře,
# nebo ručně přes záložku "Actions" -> "Run workflow"
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout projektu
        uses: actions/checkout@v4

      - name: Diagnostika - kontrola obsahu repozitare
        run: |
          echo "=== Obsah slozky main/ ==="
          ls -la main/
          echo "=== Obsah main/idf_component.yml (pokud existuje) ==="
          cat main/idf_component.yml || echo "SOUBOR main/idf_component.yml NEEXISTUJE"

      - name: Sestaveni pres oficialni Docker image espressif/esp-matter
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e ESP_MATTER_PATH=/opt/espressif/esp-matter \
            espressif/esp-matter:release-v1.5_idf_v5.4.1 \
            bash -c "source /opt/espressif/esp-matter/export.sh && cd /workspace && idf.py -DSDKCONFIG_DEFAULTS='sdkconfig.defaults;sdkconfig.defaults.esp32c6_thread' set-target esp32c6 && idf.py build"

      - name: Priprava vystupnich souboru
        run: |
          mkdir -p firmware_output
          cp build/matter_led_c6.bin firmware_output/ 2>/dev/null || cp build/*.bin firmware_output/ 2>/dev/null || true
          cp build/bootloader/bootloader.bin firmware_output/
          cp build/partition_table/partition-table.bin firmware_output/
          cp build/flash_args firmware_output/ || true
          ls -la firmware_output/

      - name: Nahrani firmware jako artifact ke stazeni
        uses: actions/upload-artifact@v4
        with:
          name: matter_led_c6_firmware
          path: firmware_output/
          retention-days: 30
