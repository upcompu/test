name: Build Matter LED firmware (ESP32-C6, Thread) - cerstvy ESP-IDF v5.5.4 + esp-matter main

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout projektu
        uses: actions/checkout@v4

      - name: Cache pro esp-matter (klonovani + instalace host nastroju)
        uses: actions/cache@v4
        with:
          path: /home/runner/esp-matter-cache
          key: esp-matter-cache-v1

      - name: Sestaveni s cerstvym ESP-IDF v5.5.4 + esp-matter main branch
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v /home/runner/esp-matter-cache:/opt/esp-matter \
            espressif/idf:v5.5.4 \
            bash -c "
              set -e
              if [ ! -f /opt/esp-matter/install.sh ]; then
                echo '=== Cache prazdna - klonovani esp-matter (shallow) ===' &&
                git clone --depth 1 https://github.com/espressif/esp-matter.git /tmp/esp-matter-src &&
                cp -r /tmp/esp-matter-src/. /opt/esp-matter &&
                cd /opt/esp-matter &&
                git submodule update --init --depth 1 &&
                cd connectedhomeip/connectedhomeip &&
                ./scripts/checkout_submodules.py --platform esp32 linux --shallow &&
                cd /opt/esp-matter &&
                apt-get update && apt-get install -y git gcc g++ pkg-config libssl-dev libdbus-1-dev libglib2.0-dev libavahi-client-dev ninja-build python3-venv python3-dev python3-pip unzip libgirepository1.0-dev libcairo2-dev libreadline-dev libffi-dev build-essential libevent-dev &&
                ./install.sh
              else
                echo '=== Cache nalezena, preskakuji klonovani/instalaci ===' &&
                apt-get update && apt-get install -y git gcc g++ pkg-config libssl-dev libdbus-1-dev libglib2.0-dev libavahi-client-dev ninja-build python3-venv python3-dev python3-pip unzip libgirepository1.0-dev libcairo2-dev libreadline-dev libffi-dev build-essential libevent-dev
              fi &&
              source \$IDF_PATH/export.sh &&
              source /opt/esp-matter/export.sh &&
              export ESP_MATTER_PATH=/opt/esp-matter &&
              cd /workspace &&
              idf.py -DSDKCONFIG_DEFAULTS='sdkconfig.defaults;sdkconfig.defaults.esp32c6_thread' set-target esp32c6 &&
              idf.py build
            "

      - name: Priprava vystupnich souboru
        run: |
          mkdir -p firmware_output
          cp build/matter_led_c6.bin firmware_output/ 2>/dev/null || cp build/*.bin firmware_output/ 2>/dev/null || true
          cp build/bootloader/bootloader.bin firmware_output/
          cp build/partition_table/partition-table.bin firmware_output/
          cp build/flash_args firmware_output/ || true
          ls -la firmware_output/

      - name: Nahrani firmware jako artifact ke stazeni
        uses: actions/upload-artifact@v4
        with:
          name: matter_led_c6_firmware
          path: firmware_output/
          retention-days: 30
